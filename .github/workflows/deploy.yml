name: Deploy Storybook to design-system.t2-apps.net

# Click-deploy: pick any branch in the GitHub Actions UI and dispatch.
# Builds the Storybook export and pushes to S3 + CloudFront invalidation.

on:
  workflow_dispatch:

concurrency:
  group: deploy-design-system
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: af-south-1

      - name: Sync assets to S3 (long-lived cache)
        env:
          BUCKET: ${{ vars.DESIGN_SYSTEM_BUCKET }}
        run: |
          aws s3 sync storybook-static/ "s3://${BUCKET}" \
            --delete \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.xml" \
            --exclude "*.txt" \
            --cache-control "public,max-age=31536000,immutable" \
            --metadata-directive REPLACE

      - name: Sync HTML/JSON to S3 (short-lived cache)
        env:
          BUCKET: ${{ vars.DESIGN_SYSTEM_BUCKET }}
        run: |
          aws s3 sync storybook-static/ "s3://${BUCKET}" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.xml" \
            --include "*.txt" \
            --cache-control "public,max-age=60,stale-while-revalidate=300" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront cache
        env:
          CF_DISTRIBUTION_ID: ${{ vars.DESIGN_SYSTEM_CF_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CF_DISTRIBUTION_ID}" \
            --paths "/*"
