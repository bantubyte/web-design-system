name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, unit, Storybook
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: af-south-1

      - name: Authenticate npm with CodeArtifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --region eu-west-1 \
            --domain timbuk2 \
            --domain-owner 539247467239 \
            --query authorizationToken \
            --output text)
          echo "::add-mask::${TOKEN}"
          echo "//timbuk2-539247467239.d.codeartifact.eu-west-1.amazonaws.com/npm/npm/:_authToken=${TOKEN}" >> ~/.npmrc

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit

      - name: Storybook component + a11y tests
        run: npm run test:storybook
